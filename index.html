<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="量化闪卡">
<meta name="description" content="项目风险管理量化分析闪卡 — 30张概念公式卡，支持进度追踪">
<link rel="manifest" href="manifest.json">
<title>项目风险管理 · 量化分析闪卡</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false})"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #252836;
    --border: #2e3347;
    --text: #e8eaf0;
    --text-muted: #7c8299;
    --accent: #5b6af5;
    --accent-glow: rgba(91,106,245,0.18);
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --green-bg: rgba(34,197,94,0.1);
    --yellow-bg: rgba(245,158,11,0.1);
    --red-bg: rgba(239,68,68,0.1);
    --card-w: min(640px, 94vw);
    --card-h: 440px;
    --radius: 16px;
    --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif;
    --mono: ui-monospace, 'SF Mono', Menlo, Monaco, 'Cascadia Mono', monospace;
    --ctrl-h: 0px; /* overridden on mobile */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 32px;
    padding-bottom: max(32px, env(safe-area-inset-bottom));
    overflow-x: hidden;
  }

  /* ── Column wrapper ── */
  .col {
    width: 100%;
    max-width: var(--card-w);
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    width: 100%;
    margin-bottom: 16px;
  }
  header h1 {
    font-size: clamp(1rem, 4vw, 1.25rem);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  header p { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

  /* ── Stats bar ── */
  .stats {
    width: 100%;
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 7px 12px;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat strong { font-size: 1rem; font-weight: 700; }
  .stat.known strong { color: var(--green); }
  .stat.unknown strong { color: var(--red); }
  .stat.total strong { color: var(--accent); }

  /* ── Progress ── */
  .progress-wrap {
    width: 100%;
    margin-bottom: 14px;
  }
  .progress-bar {
    height: 5px;
    background: var(--surface2);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent) 0%, var(--green) 100%);
    border-radius: 999px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }
  .progress-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 4px;
    display: flex;
    justify-content: space-between;
  }

  /* ── Filters ── */
  .filters {
    width: 100%;
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 11px;
    font-size: 0.73rem;
    color: var(--text-muted);
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
    white-space: nowrap;
    user-select: none;
  }
  .filter-btn:hover { background: var(--surface2); color: var(--text); }
  .filter-btn.active {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
  }
  .filter-btn.prio-green.active { background: var(--green-bg); border-color: var(--green); color: var(--green); }
  .filter-btn.prio-yellow.active { background: var(--yellow-bg); border-color: var(--yellow); color: var(--yellow); }
  .filter-btn.prio-red.active { background: var(--red-bg); border-color: var(--red); color: var(--red); }

  /* ── Card stage ── */
  .stage {
    width: 100%;
    height: var(--card-h);
    position: relative;
    margin-bottom: 16px;
    cursor: pointer;
    flex-shrink: 0;
    touch-action: pan-y;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    /* 2D flip: scaleX squeeze + face swap — no 3D, works everywhere */
    transition: transform 0.15s ease-in;
    transform-origin: center center;
  }
  .card-inner.flipping { transform: scaleX(0.02); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    padding: clamp(18px, 4vw, 28px) clamp(18px, 5vw, 32px);
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }
  .card-face.back {
    background: var(--surface2);
    display: none;
  }
  .card-inner.show-back .card-face.front { display: none; }
  .card-inner.show-back .card-face.back  { display: flex; }

  .card-label {
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.5;
  }
  .card-face.front .card-label { color: var(--accent); }
  .card-face.back  .card-label { color: var(--green); }

  .card-content {
    flex: 1;
    display: flex;
    align-items: center;
    font-size: clamp(0.88rem, 2.4vw, 1rem);
    line-height: 1.65;
    color: var(--text);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .card-content-inner { width: 100%; }
  .card-content-inner .katex { font-size: 1.05em; }
  .card-content-inner .katex-display { margin: 8px 0; }

  .card-meta {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 7px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 0.63rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 2px 8px;
    border-radius: 6px;
    text-transform: uppercase;
  }
  .badge.cat { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .card-face.back .badge.cat { background: var(--bg); }
  .badge.prio-green  { background: var(--green-bg);  color: var(--green); }
  .badge.prio-yellow { background: var(--yellow-bg); color: var(--yellow); }
  .badge.prio-red    { background: var(--red-bg);    color: var(--red); }
  .card-num { font-size: 0.66rem; color: var(--text-muted); margin-left: auto; font-family: var(--mono); }

  /* ── Controls (desktop inline) ── */
  .controls-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 10px;
  }
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 18px;
    font-size: 0.82rem;
    color: var(--text);
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
    min-height: 42px;
  }
  .ctrl-btn:hover  { background: var(--surface2); }
  .ctrl-btn:active { opacity: 0.7; }
  .ctrl-btn:disabled { opacity: 0.3; cursor: default; }
  .ctrl-btn.know    { border-color: var(--green);  color: var(--green); }
  .ctrl-btn.know:hover    { background: var(--green-bg); }
  .ctrl-btn.unknown { border-color: var(--red);    color: var(--red); }
  .ctrl-btn.unknown:hover { background: var(--red-bg); }
  .ctrl-btn.shuffle { border-color: var(--yellow); color: var(--yellow); }
  .ctrl-btn.shuffle:hover { background: var(--yellow-bg); }

  /* ── Hint ── */
  .hint {
    font-size: 0.68rem;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.02em;
    margin-bottom: 20px;
  }
  kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: var(--mono);
    font-size: 0.66rem;
  }
  .hint.touch-hint { display: none; }

  /* ── Export button ── */
  .ctrl-btn.export { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.export:hover { background: var(--accent-glow); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: calc(160px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.82rem;
    padding: 10px 20px;
    border-radius: 10px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
    z-index: 200;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  @media (min-width: 601px) {
    .toast { bottom: 40px; }
  }

  /* ── Empty state ── */
  .empty {
    color: var(--text-muted);
    font-size: 0.9rem;
    text-align: center;
    padding: 40px;
  }

  /* ── Scrollbar ── */
  .card-content::-webkit-scrollbar { width: 4px; }
  .card-content::-webkit-scrollbar-track { background: transparent; }
  .card-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Mobile layout ── */
  @media (max-width: 600px) {
    :root { --card-h: 380px; }

    body {
      padding-bottom: calc(148px + env(safe-area-inset-bottom));
    }

    .hint.keyboard-hint { display: none; }
    .hint.touch-hint {
      display: block;
      font-size: 0.68rem;
      margin-bottom: 8px;
    }

    /* sticky bottom action bar */
    .controls-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 100%;
      margin: 0;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
      gap: 8px;
      z-index: 100;
    }

    .controls { gap: 8px; }

    .ctrl-btn {
      padding: 10px 14px;
      font-size: 0.8rem;
      border-radius: 10px;
      flex: 1;
      justify-content: center;
      min-height: 44px; /* iOS min tap target */
    }
    /* Nav row: prev/next take less flex */
    .controls.nav-row .ctrl-btn { flex: 0 1 auto; padding: 10px 18px; }
    .controls.action-row .ctrl-btn.know,
    .controls.action-row .ctrl-btn.unknown { flex: 2; }
    .controls.action-row .ctrl-btn.shuffle,
    .controls.action-row .ctrl-btn { flex: 1; }
  }
</style>
</head>
<body>
<div class="col">

<header>
  <h1>项目风险管理 · 量化分析闪卡</h1>
  <p>30 张 · 14 个方法类别 · 基于课件 2-5、3-6、3-7 章</p>
</header>

<div class="stats">
  <div class="stat total"><strong id="statTotal">0</strong> 当前筛选</div>
  <div class="stat known"><strong id="statKnown">0</strong> 已掌握</div>
  <div class="stat unknown"><strong id="statUnknown">0</strong> 待复习</div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label"><span id="progressLabel">0 / 0 已复习</span><span id="progressPct">0%</span></div>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="cat:概率基础">概率基础</button>
  <button class="filter-btn" data-filter="cat:常用分布">常用分布</button>
  <button class="filter-btn" data-filter="cat:三大极限定理">极限定理</button>
  <button class="filter-btn" data-filter="cat:盈亏平衡">盈亏平衡</button>
  <button class="filter-btn" data-filter="cat:敏感性分析">敏感性分析</button>
  <button class="filter-btn" data-filter="cat:期望值法EMV">EMV</button>
  <button class="filter-btn" data-filter="cat:回归分析">回归分析</button>
  <button class="filter-btn" data-filter="cat:决策树法">决策树</button>
  <button class="filter-btn" data-filter="cat:贝叶斯决策">贝叶斯</button>
  <button class="filter-btn" data-filter="cat:故障树FTA">FTA</button>
  <button class="filter-btn" data-filter="cat:PERT计划评审技术">PERT</button>
  <button class="filter-btn" data-filter="cat:GERT图形评审技术">GERT</button>
  <button class="filter-btn" data-filter="cat:AHP层次分析法">AHP</button>
  <button class="filter-btn" data-filter="cat:不确定型决策五准则">不确定决策</button>
  <button class="filter-btn prio-green"  data-filter="prio:green">🟢 低难</button>
  <button class="filter-btn prio-yellow" data-filter="prio:yellow">🟡 中难</button>
  <button class="filter-btn prio-red"    data-filter="prio:red">🔴 高难</button>
  <button class="filter-btn" data-filter="status:unknown">待复习</button>
</div>

<div class="stage" id="stage" onclick="flipCard()">
  <div class="card-inner" id="cardInner">
    <div class="card-face front">
      <div class="card-label">概念 / 公式</div>
      <div class="card-content"><div class="card-content-inner" id="frontContent"></div></div>
      <div class="card-meta">
        <span class="badge cat" id="frontCat"></span>
        <span class="badge" id="frontPrio"></span>
        <span class="card-num" id="frontNum"></span>
      </div>
    </div>
    <div class="card-face back">
      <div class="card-label">案例 / 例题</div>
      <div class="card-content"><div class="card-content-inner" id="backContent"></div></div>
      <div class="card-meta">
        <span class="badge cat" id="backCat"></span>
        <span class="badge" id="backPrio"></span>
        <span class="card-num" id="backNum"></span>
      </div>
    </div>
  </div>
</div>

<div class="hint touch-hint">← 左滑下一张 · 右滑上一张 · 点击翻牌</div>
<div class="hint keyboard-hint">
  <kbd>Space</kbd> 翻牌 &nbsp;
  <kbd>←</kbd> 上一张 &nbsp;
  <kbd>→</kbd> 下一张 &nbsp;
  <kbd>K</kbd> 已掌握 &nbsp;
  <kbd>U</kbd> 待复习
</div>

<div id="emptyState" class="empty" style="display:none">当前筛选无卡片，请更换过滤条件。</div>

<!-- Controls: on desktop inline, on mobile fixed bottom -->
<div class="controls-wrap">
  <div class="controls nav-row">
    <button class="ctrl-btn" id="btnPrev" onclick="prevCard()">← 上一张</button>
    <button class="ctrl-btn shuffle" onclick="shuffle()">⇄ 随机</button>
    <button class="ctrl-btn" onclick="resetAll()">↺ 重置</button>
    <button class="ctrl-btn" id="btnNext" onclick="nextCard()">下一张 →</button>
  </div>
  <div class="controls action-row">
    <button class="ctrl-btn unknown" onclick="markUnknown()">✗ 待复习</button>
    <button class="ctrl-btn know" onclick="markKnown()">✓ 已掌握</button>
  </div>
  <div class="controls" style="justify-content:center">
    <button class="ctrl-btn export" onclick="exportProgress()" style="flex:0 1 auto">📤 导出进度链接</button>
  </div>
</div>

</div><!-- /.col -->
<div class="toast" id="toast"></div>

<script>
const CARDS = [
  {q:"条件概率 (Conditional Probability)\n核心公式：$P(A|B) = \\frac{P(AB)}{P(B)}$\n符号说明：$P(A|B)$ 表示在“事件B已发生”的条件下，事件A发生的概率；$P(AB)$ 为A和B同时发生的概率；$P(B)$ 为B独立发生的总概率。",a:"【案例】某设备用到20年概率0.8，用到25年概率0.4。已知已用20年，能再用5年的概率？\n步骤：①定义：A=“用到20年”，B=“用到25年”。②因用到25年必已过20年，$P(AB)=P(B)=0.4$。③套公式：$P(B|A) = \\frac{0.4}{0.8} = 0.5$（50%）。",cat:"概率基础",prio:"green"},
  {q:"离散型随机变量：期望与方差\n核心公式：\n期望 $E = \\sum x_i p_i$\n方差 $\\sigma^2 = \\sum p_i (x_i - \\mu)^2$\n风险度 $FD = \\frac{\\sqrt{D(x)}}{E(x)}$\n符号说明：$x_i$ 为状态值，$p_i$ 为对应概率，$\\mu$ 为期望，FD 值越大风险越大。",a:"【案例】某项目损失分布：0元(0.508)、500元(0.342)、1000元(0.15)。求期望损失与标准差。\n步骤：\n①期望：$E = 0\\times0.508 + 500\\times0.342 + 1000\\times0.15 = 321$ 元\n②方差：$\\sigma^2 = (0-321)^2\\times0.508 + (500-321)^2\\times0.342 + (1000-321)^2\\times0.15 \\approx 132496$\n③标准差：$\\sigma = \\sqrt{132496} \\approx 364$ 元",cat:"概率基础",prio:"yellow"},
  {q:"正态分布 Z 值标准化 (Normal Distribution)\n核心公式：$Z = \\frac{X - \\mu}{\\sigma} \\sim N(0,1)$\n符号说明：$Z$ 表示目标值偏离均值几个标准差；$X$ 为目标边界值；$\\mu$ 为期望；$\\sigma$ 为标准差。查标准正态分布表即可得概率。",a:"【案例】某项目平均完工 $\\mu=28$ 天，标准差 $\\sigma=7.81$ 天。求30天内完工概率。\n步骤：\n①换算Z值：$Z = \\frac{30-28}{7.81} \\approx 0.256$\n②查标准正态表：$P(Z<0.256) \\approx 60.1\\%$\n结论：30天内按时完工概率约60%。",cat:"常用分布",prio:"green"},
  {q:"二项分布/贝努里试验 (Binomial Distribution)\n核心公式：$P_n(k) = C_n^k p^k q^{n-k}$\n符号说明：$n$ 为总试验次数；$k$ 为目标发生次数；$p$ 为单次发生概率；$q=1-p$；$C_n^k$ 为组合数。",a:"【案例】上学途中有5个路口，每路口遇红灯概率1/3。求至少遇1次红灯的概率。\n步骤：\n①用对立事件法：$P(\\ge 1) = 1 - P(0次)$\n②算0次概率：$P(0) = C_5^0 (1/3)^0 (2/3)^5 = (2/3)^5 = 32/243$\n③结论：$P = 1 - 32/243 = 211/243 \\approx 86.8\\%$",cat:"常用分布",prio:"green"},
  {q:"均匀分布 (Uniform Distribution)\n核心公式：\nPDF：$f(x) = \\frac{1}{b-a}$（$a \\le x < b$）\n均值：$E(x) = \\frac{a+b}{2}$\n方差：$D(x) = \\frac{(b-a)^2}{12}$\n符号说明：$a, b$ 为区间边界。适用于区间内任意值等可能出现的场景（如候车时间）。",a:"【案例】公交车每15分钟一班，乘客到达时间 $X \\sim U(0,30)$。求候车少于5分钟的概率。\n步骤：\n①候车<5分钟需在10~15分或25~30分到达\n②概率=面积：$P = \\frac{5}{30}+\\frac{5}{30} = \\frac{1}{3}$\n结论：候车少于5分钟概率约 33.3%",cat:"常用分布",prio:"green"},
  {q:"指数分布 (Exponential Distribution)\n核心公式：\nPDF：$f(x) = \\lambda e^{-\\lambda x}$\n均值：$E(x) = \\frac{1}{\\lambda}$\n方差：$D(x) = \\frac{1}{\\lambda^2}$\n关键特性：无记忆性。常用于描述电子元器件或复杂系统寿命。$\\lambda$ 为故障率。",a:"【案例】某发动机平均寿命5000小时。求1000小时内发生故障的概率。\n步骤：\n①故障率：$\\lambda = 1/5000$\n②求累积故障概率：$P(X \\le 1000) = 1 - e^{-\\lambda x} = 1 - e^{-1000/5000}$\n③计算：$= 1 - e^{-0.2} \\approx 1 - 0.8187 = 0.1813$\n结论：1000小时内故障概率约 18.1%",cat:"常用分布",prio:"yellow"},
  {q:"切贝雪夫不等式 (Chebyshev's Inequality)\n核心公式：$P(|X - E(X)| \\ge \\varepsilon) \\le \\frac{D(X)}{\\varepsilon^2}$\n等价形式：$P(|X - E(X)| < \\varepsilon) \\ge 1 - \\frac{D(X)}{\\varepsilon^2}$\n用途：在分布未知时，估算事件落在期望附近区间的概率下限。$\\varepsilon$ 为允许偏差界限。",a:"【案例】抛硬币1000次，$p=0.5$。估算正面次数在450~550之间的概率下限。\n步骤：\n①期望：$E(X) = 500$，方差：$D(X) = 1000\\times0.5\\times0.5 = 250$\n②偏差界限：$\\varepsilon = 50$\n③套公式：$P(|X-500|<50) \\ge 1 - \\frac{250}{50^2} = 1 - 0.1 = 0.9$\n结论：落在450~550之间的概率至少90%",cat:"三大极限定理",prio:"red"},
  {q:"贝努里大数定理 (Law of Large Numbers)\n核心公式：$\\lim_{n \\to \\infty} P(|\\frac{m}{n} - p| < \\varepsilon) = 1$\n推导最小试验量：$n > \\frac{p(1-p)}{(1-\\text{可靠度})\\varepsilon^2}$\n符号说明：$m/n$ 为实测频率；$p$ 为理论概率；$\\varepsilon$ 为允许最大误差。大样本下频率趋于稳定等于概率。",a:"【案例】开关电路每次开电概率0.5，要求实测频率与理论值误差<0.01且可靠度>99%，至少需要几次试验？\n步骤：\n①建不等式：$1 - \\frac{0.25}{n\\times0.0001} > 0.99$\n②移项：$\\frac{0.25}{n\\times0.0001} < 0.01$\n③求解：$n > \\frac{0.25}{0.01\\times0.0001} = 250000$\n结论：至少需要 25 万次",cat:"三大极限定理",prio:"red"},
  {q:"中心极限定理 (Central Limit Theorem)\n核心公式：$Z = \\frac{\\bar{X} - \\mu}{\\sigma / \\sqrt{n}} \\to N(0,1)$\nPERT 应用：$Z = \\frac{T_0 - \\bar{T}}{\\sigma_T}$\n意义：大量独立同分布随机变量之和近似服从正态分布，是 PERT 工期概率计算的理论基础。",a:"【案例】项目关键路径期望总工期 $\\bar{T}=90$ 天，总标准差 $\\sigma_T=6.35$ 天。求100天内完工概率。\n步骤：\n①中心极限定理保证总工期近似正态分布\n②标准化：$Z = \\frac{100-90}{6.35} \\approx 1.57$\n③查正态表：$P(Z<1.57) \\approx 0.94$\n结论：100天内完工概率约 94%",cat:"三大极限定理",prio:"green"},
  {q:"盈亏平衡点 / 保本产量 (Break-Even Point)\n核心公式：$Q_0 = \\frac{D}{R - V}$\n符号说明：$Q_0$ 为保本产量（此时盈利=0）；$D$ 为总固定成本；$R$ 为单价；$V$ 为单位可变成本；$(R-V)$ 为边际贡献。",a:"【案例】固定成本75000元，单价50元，单位可变成本20元。求保本产量。\n步骤：\n$Q_0 = \\frac{75000}{50-20} = \\frac{75000}{30} = 2500$ 件\n结论：超过2500件后每件赚30元纯利润。",cat:"盈亏平衡",prio:"green"},
  {q:"盈亏平衡衍生：目标利润产量\n核心公式：$Q = \\frac{D + S}{R - V}$\n符号说明：$S$ 为目标利润金额（当 $S=0$ 时退化为保本公式）；其余同保本公式。核心逻辑：把目标利润视为“必须覆盖的额外固定成本”。",a:"【案例】固定成本75000元，目标利润45000元，售价降至45元，可变成本20元。需生产多少件？\n步骤：\n①边际贡献：$R-V = 45-20 = 25$ 元/件\n②代入公式：$Q = \\frac{75000+45000}{25} = \\frac{120000}{25} = 4800$ 件\n结论：需生产4800件才能达成目标利润",cat:"盈亏平衡",prio:"yellow"},
  {q:"敏感性分析：NPV 单因素变动 (Sensitivity Analysis)\n核心方法：令 $NPV = f(因素变动率)$，分析某因素变动对 NPV 的影响幅度，找出临界变动率最小的“最敏感主宰因素”。\n公式框架：$NPV = -K(1+x) + [(B-C)(1+z) - C(1+y)](P/A, i, n) + \\cdots$",a:"【案例】某项目基准 NPV=1580万，初始投资K=3000万。若投资额增加10%，新NPV为多少？\n步骤：\n①投资超支：$3000\\times10\\% = 300$ 万\n②投资增加直接减少NPV：$NPV_{new} = 1580 - 300 = 1280$ 万\n结论：投资+10%后NPV=1280万，仍>0项目仍可行。",cat:"敏感性分析",prio:"green"},
  {q:"敏感性分析：临界值求解 (Critical Point)\n核心方法：令目标 $NPV = 0$，解出允许的最大变动率。临界变动率越小，该因素越敏感，越是需要重点管控的风险因素。",a:"【案例】某项目 $NPV = 11394 - 15000x$（$x$ 为投资变动率）。求投资额的临界点。\n步骤：\n①令 $NPV=0$：$11394 - 15000x = 0$\n②求解：$x = 11394/15000 = 0.7596$（约76%）\n结论：投资额增加超过76%时项目亏损。余量大说明该因素不敏感，风险较低。",cat:"敏感性分析",prio:"yellow"},
  {q:"期望损益值法 EMV (Expected Monetary Value)\n核心公式：$EMV = \\sum_{i=1}^{m} P_i X_i$\n符号说明：$P_i$ 为第 $i$ 种自然状态的概率；$X_i$ 为该状态下的损益金额。决策原则：选 EMV 最大的方案。",a:"【案例】方案A“大批量生产”：销路好(0.3)赚20万；销路一般(0.5)赚14万；销路差(0.2)亏2万。\n步骤：\n$EMV_A = 0.3\\times20 + 0.5\\times14 + 0.2\\times(-2) = 6+7-0.4 = 12.6$ 万元\n结论：长期平均期望收益12.6万元/次。",cat:"期望值法EMV",prio:"green"},
  {q:"期望效用值分析法 (Expected Utility)\n核心公式：$E(U) = \\sum P_i U(X_i)$\n符号说明：$U(X_i)$ 为通过效用曲线将金额转化为效用值（0~1）。效用曲线上凸=风险厌恶（保守型），下凸=风险偏好（冒险型）。",a:"【案例】方案A：销路好(0.7)赚70万（效用1.0）；销路差(0.3)亏50万（效用0.0）。\n步骤：\n$E(U_A) = 0.7\\times1.0 + 0.3\\times0 = 0.7$\n意义：效用值0.7反映决策者心理偏好。极度厌恶亏损时，即使期望金额高的方案也可能因效用值低而不被选择。",cat:"期望值法EMV",prio:"yellow"},
  {q:"一元线性回归：应用预测 (Linear Regression)\n核心公式：$\\hat{Y} = \\beta_0 + \\beta_1 X$\n符号说明：$\\hat{Y}$ 为预测因变量；$X$ 为已知自变量；$\\beta_1$ 为斜率；$\\beta_0$ 为截距。",a:"【案例】数控机床刀具寿命回归方程：$\\hat{Y} = 106.90 - 0.8X$（斜率负值=速度越快寿命越短）。设切削速度 $X=90$ 米/分钟，预测刀具寿命。\n步骤：\n$\\hat{Y} = 106.90 - 0.8\\times90 = 106.90 - 72 = 34.9$ 分钟\n结论：该切削速度下刀具预计寿命34.9分钟。",cat:"回归分析",prio:"green"},
  {q:"回归系数最小二乘法计算 (Least Squares)\n核心公式：\n斜率：$\\beta_1 = \\frac{\\sum (x_i - \\bar{x})(y_i - \\bar{y})}{\\sum (x_i - \\bar{x})^2}$\n截距：$\\beta_0 = \\bar{y} - \\beta_1 \\bar{x}$\n分子=XY协方差，分母=X的方差。最小化残差平方和。",a:"【案例】3组数据：(X=1,Y=5)、(X=2,Y=4)、(X=3,Y=3)。手算回归方程。\n步骤：\n①均值：$\\bar{x}=2, \\bar{y}=4$\n②分子：$(1-2)(5-4)+(2-2)(4-4)+(3-2)(3-4) = -1+0-1 = -2$\n③分母：$(1-2)^2+(2-2)^2+(3-2)^2 = 2$\n④$\\beta_1 = -2/2 = -1$；$\\beta_0 = 4-(-1\\times2) = 6$\n方程：$\\hat{Y} = 6 - X$",cat:"回归分析",prio:"red"},
  {q:"决策树法：结点符号与计算规则 (Decision Tree)\n核心规则：\n□ 方形 = 决策点（选最大EMV，剪掉劣势分支）\n○ 圆形 = 状态点（计算 $EMV = \\sum P_i \\times 收益$）\n计算方向：由右向左逐步倒推，在决策点“剪枝”。",a:"【案例】决策点：生产老产品或新产品。\n老产品：需求大(0.8)赚30万，需求小(0.2)赚10万。\n新产品：需求大(0.8)赚50万，需求小(0.2)亏5万。\n步骤：\n①老产品EMV：$30\\times0.8+10\\times0.2 = 26$ 万\n②新产品EMV：$50\\times0.8+(-5)\\times0.2 = 39$ 万\n③决策点剪枝：$\\max(26,39)=39$ → 选新产品",cat:"决策树法",prio:"green"},
  {q:"决策树法：多阶段决策倒推 (Multi-Stage Decision Tree)\n核心要点：从最右端（最晚期）出发，逐层向左倒推，将后期最优值赋予前方圆形节点。含有多个依次递进的决策点。",a:"【案例】第3年末新决策：扩建(后7年每年190万，追加400万) vs 不扩建(后7年每年80万)。\n步骤：\n①扩建净收益：$190\\times7 - 400 = 930$ 万\n②不扩建净收益：$80\\times7 = 560$ 万\n③第3年末剪枝：$\\max(930,560) = 930$，选扩建\n④将930万赋予前方圆圈节点，继续向左参与最初大厂/小厂决策。",cat:"决策树法",prio:"yellow"},
  {q:"全概率公式 (Law of Total Probability)\n核心公式：$P(B) = \\sum_{i=1}^{n} P(A_i)P(B|A_i)$\n符号说明：$P(B)$ 为目标事件总概率；$P(A_i)$ 为各互斥途径的先验概率；$P(B|A_i)$ 为该途径下目标的条件概率。本质：各途径分别加权求和。",a:"【案例】5支枪：3支校正(中靶率0.9)，2支未校正(中靶率0.4)。随机取一支射击，中靶总概率？\n步骤：\n①$P(A_1)=3/5=0.6$，$P(A_2)=2/5=0.4$\n②全概率：$P = 0.6\\times0.9 + 0.4\\times0.4 = 0.54+0.16 = 0.70$\n结论：总中靶概率 70%",cat:"贝叶斯决策",prio:"green"},
  {q:"贝叶斯公式：后验概率 (Bayes' Theorem)\n核心公式：$P(A_i|B) = \\frac{P(A_i)P(B|A_i)}{\\sum P(A_i)P(B|A_i)}$\n符号说明：$P(A_i|B)$ 为后验概率（已知结果B，反推是途径 $A_i$ 的概率）；分母即全概率公式结果。",a:"【案例】A厂产60%(次品率35%)，B厂产40%(次品率25%)。随机抽到次品，是A厂的概率？\n步骤：\n①全概率（分母）：$P(次品) = 0.6\\times0.35 + 0.4\\times0.25 = 0.31$\n②A厂贡献（分子）：$0.6\\times0.35 = 0.21$\n③后验：$P(A|次品) = 0.21/0.31 \\approx 67.7\\%$",cat:"贝叶斯决策",prio:"yellow"},
  {q:"故障树分析：逻辑结构与最小割集 (FTA Minimal Cut Sets)\n核心规则：\n“或门” → 相加（任一发生即导致故障）\n“与门” → 相乘（全部发生才导致故障）\n布尔代数化简：吸收律 $a+ab=a$，等幂律 $a\\cdot a=a$\n每个最终乘积项 = 一个最小割集。",a:"【案例】$T = X_1 + X_2 \\cdot (X_4+X_5) \\cdot X_3$（$X_1$=电源故障）\n步骤：\n①展开：$T = X_1 + X_2X_3X_4 + X_2X_3X_5$\n②无可吸收项，读出3个最小割集：\n  ·$\\{X_1\\}$ 单点故障（最薄弱）\n  ·$\\{X_2,X_3,X_4\\}$\n  ·$\\{X_2,X_3,X_5\\}$",cat:"故障树FTA",prio:"yellow"},
  {q:"故障树分析：系统故障概率估算 (FTA Probability)\n核心公式：$\\tilde{Q}_s = \\sqrt{Q_s^{上} \\cdot Q_s^{下}}$\n上界：$Q_s^{上} = \\sum Q_i$\n下界：$Q_s^{下} = \\sum Q_i - \\sum Q_{ij}$\n取几何平均估算系统故障概率，避免割集重叠导致的重复计算问题。",a:"【案例】三个最小割集：$Q_1=0.001, Q_2=0.002, Q_3=0.004$；两两交集：$Q_{12}=2\\times10^{-6}, Q_{13}=4\\times10^{-6}, Q_{23}=0.0002$。\n步骤：\n①上界：$Q^{上} = 0.007$\n②下界：$Q^{下} = 0.007 - 0.000006 - 0.0002 = 0.006794$\n③几何均值：$\\tilde{Q}_s = \\sqrt{0.007\\times0.006794} \\approx 0.0068$\n结论：系统故障概率约 0.68%",cat:"故障树FTA",prio:"red"},
  {q:"PERT 三点估算：期望时间与方差\n核心公式：\n期望时间：$\\mu = \\frac{a + 4m + b}{6}$\n工序方差：$\\sigma^2 = \\frac{(b-a)^2}{36}$\n符号说明：$a$=最乐观，$m$=最可能（权重4倍），$b$=最悲观。方差代表该工序不确定性风险大小。",a:"【案例】某工序：乐观 $a=3$ 天，最可能 $m=8$ 天，悲观 $b=13$ 天。\n步骤：\n①期望：$\\mu = \\frac{3+4\\times8+13}{6} = \\frac{48}{6} = 8$ 天\n②方差：$\\sigma^2 = \\frac{(13-3)^2}{36} = \\frac{100}{36} \\approx 2.78$\n结论：按8天排期，不确定性方差2.78。",cat:"PERT计划评审技术",prio:"green"},
  {q:"PERT 项目完工概率计算 (PERT Completion Probability)\n核心公式：\n项目总均值：$\\bar{T} = \\sum \\mu_i$\n项目总标准差：$\\sigma_T = \\sqrt{\\sum \\sigma_i^2}$\n完工概率：$Z = \\frac{T_0 - \\bar{T}}{\\sigma_T}$ → 查正态表\n$T_0$ 为合同规定完工期限。",a:"【案例】关键路径总均值 $\\bar{T}=90$ 天，总标准差 $\\sigma_T=6.35$ 天。合同要求100天完工。\n步骤：\n①Z值：$Z = \\frac{100-90}{6.35} \\approx 1.57$\n②查正态表：$P(Z<1.57) \\approx 0.94$\n结论：100天内按时完工概率约 94%",cat:"PERT计划评审技术",prio:"yellow"},
  {q:"GERT 等效函数法 (Graphical Evaluation and Review Technique)\n核心公式：\n等效函数：$W_t(s) = p \\cdot M_t(s)$（$p$=活动发生概率，$M_t(s)=E\\{e^{st}\\}$）\n网络实现概率：$P_E = W_E(0)$\n总工期期望：$T_E = \\frac{dM_E(s)}{ds}\\big|_{s=0}$\nGERT 支持循环回路和概率分支，适用于含返工的研发类项目。",a:"【案例】某网络总等效函数：$W_E(s) = \\frac{0.49e^{37s}}{1-0.3e^{7s}} + 0.3e^{33s}$\n步骤：\n①令 $s=0$，算实现概率：$P_E = \\frac{0.49}{0.7} + 0.3 = 0.7+0.3 = 1$（必然完成）\n②对 $W_E(s)$ 求一阶导后令 $s=0$：$T_E = 25.9+2.1+9.9 = 37.9$ 小时\n结论：平均耗时37.9小时，过程必然完成。",cat:"GERT图形评审技术",prio:"red"},
  {q:"AHP 和法求权重 (AHP Weight Calculation)\n核心步骤：\n①列归一化：$\\overline{a_{ij}} = \\frac{a_{ij}}{\\sum_i a_{ij}}$\n②行求均值：$W_i = \\frac{\\sum_j \\overline{a_{ij}}}{n}$\n1~9标度：1=同等，3=稍重要，5=重要，7=很重要，9=绝对重要。",a:"【案例】3个风险因素两两比较第一列（与经济风险比较）：经济=1，技术=5，社会=3。\n步骤（归一化第一列）：\n①列和：$1+5+3 = 9$\n②归一化：经济=1/9≈0.111，技术=5/9≈0.556，社会=3/9≈0.333\n结论：同样处理其余列后，各行均值即为权重向量 $W$。",cat:"AHP层次分析法",prio:"yellow"},
  {q:"AHP 一致性检验 (Consistency Check)\n核心公式：\n$C.I. = \\frac{\\lambda_{max} - n}{n-1}$\n$C.R. = \\frac{C.I.}{R.I.}$\n判断标准：$C.R. < 0.1$ → 矩阵可接受（打分逻辑一致）\n$R.I.$ 查表获得（3阶=0.58，4阶=0.90，5阶=1.12）。",a:"【案例】3阶判断矩阵，$\\lambda_{max}=3.0056$，$R.I.=0.58$。\n步骤：\n①$C.I. = \\frac{3.0056-3}{2} = 0.0028$\n②$C.R. = \\frac{0.0028}{0.58} \\approx 0.0048$\n③$0.0048 \\ll 0.1$ → 通过一致性检验\n结论：判断矩阵逻辑一致，权重结果有效。",cat:"AHP层次分析法",prio:"yellow"},
  {q:"不确定型决策：三大基础准则\n1. 等概率(Laplace)法：假设各状态等概率，取算术平均，选最大。\n2. 乐观(大中取大)法：找每方案最好结果，选最大。\n3. 悲观(Wald小中取大)法：找每方案最坏结果，选最大（保底最优）。\n适用：自然状态概率完全未知时。",a:"【案例】利润矩阵：A大厂(畅销100, 一般50, 滞销-20)，B中厂(畅销75, 一般35, 滞销10)。\n悲观法：\n①大厂保底：$\\min(100,50,-20) = -20$\n②中厂保底：$\\min(75,35,10) = 10$\n③择优：$\\max(-20,10) = 10$，选B中厂\n结论：悲观者建中厂，最坏情况仍稳赚10万。",cat:"不确定型决策五准则",prio:"green"},
  {q:"不确定型决策：折衷与最小后悔值准则\n折衷法(Hurwicz)：$H = \\alpha \\times 最好结果 + (1-\\alpha) \\times 最坏结果$，$\\alpha$ 为乐观系数，选H最大方案。\n后悔值法(Savage)：\n①各列最大值减各格 → 后悔矩阵\n②各行取最大后悔值\n③选最大后悔值最小的方案 $\\min\\{\\max R_i\\}$",a:"【案例】A大厂(畅销100,滞销-20)，B小厂(畅销40,滞销5)。用Savage法决策。\n步骤：\n①畅销列最大=100：A后悔=0；B后悔=60\n②滞销列最大=5：A后悔=25；B后悔=0\n③各方案最大后悔：A=25，B=60\n④$\\min(25,60)=25$，选A大厂\n结论：Savage法选大厂（最大遗憾最小化）。",cat:"不确定型决策五准则",prio:"yellow"},
];

// ── State ──
let deck = [...CARDS.keys()];
let pos = 0;
let flipped = false;
let filter = 'all';
let status = {};
try { status = JSON.parse(localStorage.getItem('pm-flash-v1') || '{}'); } catch { status = {}; }

function save() {
  try { localStorage.setItem('pm-flash-v1', JSON.stringify(status)); } catch {}
}

function applyFilter() {
  deck = CARDS.map((_, i) => i).filter(i => {
    const c = CARDS[i];
    if (filter === 'all') return true;
    if (filter.startsWith('cat:'))   return c.cat === filter.slice(4);
    if (filter.startsWith('prio:'))  return c.prio === filter.slice(5);
    if (filter === 'status:unknown') return status[i] !== 'known';
    return true;
  });
  pos = 0; flipped = false;
  updateCard(); updateStats();
}

function updateCard() {
  const inner  = document.getElementById('cardInner');
  const empty  = document.getElementById('emptyState');
  const stage  = document.getElementById('stage');
  if (deck.length === 0) {
    stage.style.display = 'none'; empty.style.display = 'block'; return;
  }
  stage.style.display = 'block'; empty.style.display = 'none';
  inner.classList.remove('show-back', 'flipping');
  inner.style.transition = '';
  inner.style.transform = '';
  flipped = false;

  const idx = deck[pos];
  const c   = CARDS[idx];
  const prioLabel = {green:'🟢 低难', yellow:'🟡 中难', red:'🔴 高难'}[c.prio];
  const prioClass = 'prio-' + c.prio;
  const numText   = `${pos + 1} / ${deck.length}`;
  const st = status[idx];
  const statusMark = st === 'known' ? ' ✓' : st === 'unknown' ? ' ✗' : '';

  ['front','back'].forEach(face => {
    const pfx = face;
    document.getElementById(pfx + 'Content').innerHTML = (face === 'front' ? c.q : c.a).replace(/\n/g, '<br>');
    document.getElementById(pfx + 'Cat').textContent   = c.cat;
    const pe = document.getElementById(pfx + 'Prio');
    pe.textContent = prioLabel + statusMark;
    pe.className   = 'badge ' + prioClass;
    document.getElementById(pfx + 'Num').textContent   = numText;
  });

  renderCardMath();
  document.getElementById('btnPrev').disabled = pos === 0;
  document.getElementById('btnNext').disabled = pos === deck.length - 1;
}

function updateStats() {
  const total    = deck.length;
  const known    = deck.filter(i => status[i] === 'known').length;
  const unk      = deck.filter(i => status[i] === 'unknown').length;
  const reviewed = deck.filter(i => status[i]).length;
  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statKnown').textContent   = known;
  document.getElementById('statUnknown').textContent = unk;
  const pct = total ? Math.round(reviewed / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${reviewed} / ${total} 已复习`;
  document.getElementById('progressPct').textContent   = pct + '%';
}

function flipCard() {
  const inner = document.getElementById('cardInner');
  if (inner.classList.contains('flipping')) return;
  inner.style.transition = 'transform 0.15s ease-in';
  inner.classList.add('flipping');
  setTimeout(() => {
    flipped = !flipped;
    inner.classList.toggle('show-back', flipped);
    inner.classList.remove('flipping');
    inner.style.transition = 'transform 0.15s ease-out';
    inner.style.transform = 'scaleX(0.02)';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      inner.style.transform = 'scaleX(1)';
      setTimeout(() => { inner.style.transition = ''; inner.style.transform = ''; }, 160);
    }));
    renderCardMath();
  }, 150);
}

function prevCard() {
  if (pos > 0) { pos--; updateCard(); }
}
function nextCard() {
  if (pos < deck.length - 1) { pos++; updateCard(); }
}

function markKnown() {
  if (!deck.length) return;
  status[deck[pos]] = 'known'; save(); updateStats(); updateCard();
  if (pos < deck.length - 1) setTimeout(nextCard, 180);
}
function markUnknown() {
  if (!deck.length) return;
  status[deck[pos]] = 'unknown'; save(); updateStats(); updateCard();
  if (pos < deck.length - 1) setTimeout(nextCard, 180);
}
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  pos = 0; flipped = false; updateCard();
}
function resetAll() {
  if (!confirm('确认重置所有进度？')) return;
  Object.keys(status).forEach(k => delete status[k]);
  save(); updateCard(); updateStats();
}

function renderCardMath() {
  if (!window.renderMathInElement) return;
  const opts = {
    delimiters: [
      {left:'$$', right:'$$', display:true},
      {left:'$',  right:'$',  display:false}
    ],
    throwOnError: false
  };
  ['frontContent','backContent'].forEach(id => {
    const el = document.getElementById(id);
    if (el) renderMathInElement(el, opts);
  });
}

// ── Touch swipe ──
(function setupTouch() {
  const stage = document.getElementById('stage');
  let x0 = 0, y0 = 0, t0 = 0;

  stage.addEventListener('touchstart', e => {
    x0 = e.touches[0].clientX;
    y0 = e.touches[0].clientY;
    t0 = Date.now();
  }, {passive: true});

  stage.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - x0;
    const dy = e.changedTouches[0].clientY - y0;
    const dt = Date.now() - t0;

    if (Math.abs(dx) < 12 && Math.abs(dy) < 12 && dt < 300) {
      flipCard(); return;
    }
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 48) {
      if (dx < 0) nextCard();
      else         prevCard();
    }
  }, {passive: true});
})();

// ── Filters ──
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filter = btn.dataset.filter;
  applyFilter();
});

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowLeft')  prevCard();
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'k' || e.key === 'K') markKnown();
  if (e.key === 'u' || e.key === 'U') markUnknown();
});

// ── Init ──
function init() { updateCard(); updateStats(); importFromHash(); }
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else { init(); }
window.addEventListener('load', renderCardMath);

// ── Export / Import progress via URL hash ──
function exportProgress() {
  const data = btoa(encodeURIComponent(JSON.stringify(status)));
  const url = location.origin + location.pathname + '#p=' + data;
  navigator.clipboard.writeText(url).then(() => {
    showToast('✅ 链接已复制，发给对方打开即可同步进度');
  }).catch(() => {
    // clipboard API blocked (http), fallback prompt
    prompt('复制以下链接：', url);
  });
}

function importFromHash() {
  const m = location.hash.match(/[#&]p=([^&]+)/);
  if (!m) return;
  try {
    const imported = JSON.parse(decodeURIComponent(atob(m[1])));
    let count = 0;
    Object.entries(imported).forEach(([k, v]) => {
      if (status[k] !== v) { status[k] = v; count++; }
    });
    if (count > 0) { save(); updateCard(); updateStats(); }
    showToast(`✅ 已导入进度（${count} 张卡片更新）`);
    history.replaceState(null, '', location.pathname); // clean URL
  } catch {}
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── PWA service worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
